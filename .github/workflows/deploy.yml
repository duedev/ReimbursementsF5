name: Deploy to GitHub Pages

# Builds the static site (Vite) and publishes dist/ to GitHub Pages.
# The build's prebuild step vendors the Tesseract OCR core + language data into
# dist/, so the deployed app runs fully offline at $0 with no third-party CDN.
#
# Optional build-time secrets:
#   OPENROUTER_API_KEY      — bakes in the free vision-assist key (never in source)
#   VITE_SUPABASE_URL/KEY   — enables the optional cloud-sync layer

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you deploy manually (e.g. to preview before merge)

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build # prebuild vendors Tesseract core + language data
      - uses: actions/configure-pages@v5
      # The Pages actions below still declare Node 20 upstream; runners force
      # them onto Node 24 (a harmless warning) until GitHub ships node24
      # releases — bump these majors when they do.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
